<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens Insikt</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f7f9fc;
            color: #333333;
            line-height: 1.6;
            margin: 0;
            padding: 20px 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-top: 4px solid #4a90e2;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
        }

        h2 {
            color: #34495e;
            font-size: 20px;
            font-weight: 600;
            margin-top: 30px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 8px;
        }

        h3 {
            color: #7f8c8d;
            font-size: 18px;
            font-weight: 500;
            margin-top: 20px;
        }

        p {
            font-size: 16px;
            margin-bottom: 15px;
            color: #444;
        }

        ul,
        ol {
            font-size: 16px;
            color: #444;
            margin-bottom: 15px;
            padding-left: 20px;
        }

        li {
            margin-bottom: 8px;
        }

        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        blockquote {
            background-color: #f1f8ff;
            border-left: 4px solid #3498db;
            margin: 20px 0;
            padding: 15px 20px;
            font-style: italic;
            color: #555;
        }

        hr {
            border: 0;
            height: 1px;
            background-color: #ecf0f1;
            margin: 30px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #95a5a6;
            text-align: center;
            border-top: 1px solid #ecf0f1;
            padding-top: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            {{content}}
        </div>
        <div class="footer">
            <p>Skickat i sankt Görans ära</p>
        </div>
    </div>
</body>

</html>
